<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Services</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" style="position: absolute; left: -9999px; top: 0; z-index: 9999; padding: 8px 16px; background: #000; color: #fff; text-decoration: none;">Skip to main content</a>
    <nav aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
    <main id="main" class="page">
      <h1>Services</h1>
      <p>We offer accessibility audits, remediation, and training.</p>

      <!-- PAT: mouseover-without-focus -->
      <div onMouseOver="showTooltip(this)" onFocus="showTooltip(this)" onBlur="hideTooltip(this)" tabindex="0" style="display:inline-block; padding:8px; background:#eee;">Hover for info</div>

      <!-- PAT: character-key-shortcut -->
      <button type="button">Save</button>

      <!-- DOM: button without accessible name (icon only) -->
      <button type="button" aria-label="Favorite"><span aria-hidden="true">★</span></button>

      <!-- DOM: iframe without title -->
      <iframe title="Example embedded content" src="https://example.com" width="400" height="200"></iframe>

      <!-- DOM: table without headers -->
      <table>
        <tr>
          <td>Audit</td>
          <td>$500</td>
        </tr>
        <tr>
          <td>Remediation</td>
          <td>$1200</td>
        </tr>
      </table>

      <!-- DOM: input with no label (not placeholder — just bare) -->
      <label for="search-input">Search services</label>
      <input id="search-input" type="search" />
    </main>
    <script src="./script.js"></script>
  </body>
</html>
