<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Services</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a href="#main" class="sr-only">Skip to main content</a>
    <nav aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
    <main id="main" class="page">
      <h1>Services</h1>
      <p>We offer accessibility audits, remediation, and training.</p>

      <!-- PAT: mouseover-without-focus -->
      <div onMouseOver="showTooltip(this)" onFocus="showTooltip(this)" onBlur="hideTooltip(this)" style="display:inline-block; padding:8px; background:#eee;" tabindex="0">Hover for info</div>

      <!-- PAT: character-key-shortcut -->
      <button type="button">Save</button>

      <!-- DOM: button-name — icon button with aria-label -->
      <button type="button" aria-label="Close"><span aria-hidden="true">×</span></button>

      <!-- DOM: duplicate-id — fixed to use unique ids -->
      <section id="info-1"><p>Section one</p></section>
      <section id="info-2"><p>Section two</p></section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
