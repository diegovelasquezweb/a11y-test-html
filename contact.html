<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a href="#main" class="sr-only">Skip to main content</a>
    <nav aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
    <main id="main" class="page">
      <h1>Contact Us</h1>

      <h2>Get in Touch</h2>

      <ul>
        <li>Phone: 555-0100</li>
        <li>Email: hello@example.com</li>
      </ul>

      <form>
        <label for="topic">Topic</label>
        <select id="topic" name="topic">
          <option value="">Choose a topic</option>
          <option value="support">Support</option>
          <option value="sales">Sales</option>
        </select>

        <label for="name">Your name</label>
        <input id="name" type="text" name="name" placeholder="Your name" aria-label="Your name" />
        <label for="email">Your email</label>
        <input id="email" type="email" name="email" placeholder="Your email" aria-label="Your email" />
        <label for="message">Your message</label>
        <textarea id="message" name="message" placeholder="Your message" aria-label="Your message"></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
