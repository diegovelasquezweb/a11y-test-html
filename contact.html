<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <style>
      .skip-link {
        position: absolute;
        left: -9999px;
        top: 0;
        z-index: 9999;
        padding: 8px 16px;
        background: #000;
        color: #fff;
      }
      .skip-link:focus {
        left: 0;
      }
    </style>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>

    <main id="main-content" class="page">
      <h1>Contact Form</h1>
      <p class="intro">Use this form to get in touch with us.</p>

      <form id="contact-form" class="form" novalidate>
        <div class="field">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" autocomplete="name" required />
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <label id="topic-label" for="topic">Topic</label>
          <select id="topic" name="topic" aria-labelledby="topic-label">
            <option value="">Choose a topic</option>
            <option value="support">Support</option>
            <option value="sales">Sales</option>
          </select>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit">Submit<span aria-hidden="true">→</span></button>

        <p id="form-status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
