<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }
    </style>
  </head>
  <body>
    <nav aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
    <main id="main" class="page">
      <h1>Contact Us</h1>
      <form>
        <!-- DOM error: input without associated label -->
        <label for="email-input" class="sr-only">Your email</label>
        <input id="email-input" type="email" placeholder="Your email" />
        <!-- DOM error: button without accessible name -->
        <button aria-label="Submit"><span aria-hidden="true">→</span></button>
      </form>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
