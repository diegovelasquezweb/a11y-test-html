<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a href="#main" class="sr-only">Skip to main content</a>
    <nav aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
    <main id="main" class="page">
      <h1>Contact Us</h1>

      <!-- DOM: empty-heading — heading element with no text content -->
      <h2>Get In Touch</h2>

      <!-- DOM: list — ul with invalid div children instead of li -->
      <ul>
        <li>Phone: 555-0100</li>
        <li>Email: hello@example.com</li>
      </ul>

      <form>
        <!-- Fixed: Added aria-label to all form controls for accessible naming -->
        <label for="name" class="sr-only">Your name</label>
        <input type="text" id="name" placeholder="Your name" aria-label="Your name" />
        <label for="email" class="sr-only">Your email</label>
        <input type="email" id="email" placeholder="Your email" aria-label="Your email" />
        <label for="message" class="sr-only">Your message</label>
        <textarea id="message" placeholder="Your message"></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
