<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a href="#main" class="sr-only">Skip to main content</a>
    <nav aria-label="Primary">
      <a href="index.html" style="display: inline-block; min-width: 44px; min-height: 44px; padding: 0.5rem 1rem; text-decoration: none;">Home</a>
      <a href="about.html" style="display: inline-block; min-width: 44px; min-height: 44px; padding: 0.5rem 1rem; text-decoration: none;">About</a>
      <a href="services.html" style="display: inline-block; min-width: 44px; min-height: 44px; padding: 0.5rem 1rem; text-decoration: none;">Services</a>
      <a href="contact.html" style="display: inline-block; min-width: 44px; min-height: 44px; padding: 0.5rem 1rem; text-decoration: none;">Contact</a>
    </nav>
    <main id="main" class="page">
      <h1>Contact Us</h1>
      <form>
        <!-- PAT: placeholder-only-label × 3 (input text, input email, textarea) -->
        <label for="name">Your name</label>
        <input type="text" id="name" placeholder="Your name" />
        <label for="email">Your email</label>
        <input type="email" id="email" placeholder="Your email" />
        <label for="message">Your message</label>
        <textarea id="message" placeholder="Your message"></textarea>
        <button type="submit" style="display: inline-block; min-width: 44px; min-height: 44px; padding: 0.5rem 1rem;">Send</button>
      </form>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
