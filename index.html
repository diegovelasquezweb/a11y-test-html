<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A11y Test Form</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <h1>Contact Form</h1>
      <p class="intro">Use this form to test accessibility checks.</p>

      <!-- Error 1: image missing alt -->
      <img src="https://placehold.co/200x100" alt="Sample placeholder image showing a 200 by 100 pixel layout preview above the contact form" />

      <form id="contact-form" class="form" novalidate>
        <div class="field">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" autocomplete="name" required />
        </div>

        <!-- Error 2: input with placeholder as only label (DOM + source pattern) -->
        <div class="field">
          <label for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            aria-label="Email address"
            placeholder="Email address"
            required
          />
        </div>

        <!-- Error 3: select with no label -->
        <div class="field">
          <label id="topic-label" for="topic">Topic</label>
          <select id="topic" name="topic" aria-label="Topic" aria-labelledby="topic-label">
            <option value="">Choose a topic</option>
            <option value="support">Support</option>
            <option value="sales">Sales</option>
          </select>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <!-- Error 4: button with no accessible name -->
        <button type="submit" aria-label="Submit form"><span aria-hidden="true">→</span></button>

        <p id="form-status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
