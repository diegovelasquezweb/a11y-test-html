<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A11y Test Form</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <h1>Newsletter Signup</h1>
      <p class="intro">Use this simple form to test a clean accessibility scan.</p>

      <form id="signup-form" class="form" novalidate>
        <div class="field">
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            inputmode="email"
            placeholder="Email address"
            aria-describedby="email-help"
            required
          />
          <p id="email-help" class="help">We will only use your email for product updates.</p>
        </div>

        <button type="submit">Subscribe</button>
        <p id="form-status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
