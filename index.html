<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A11y Test Form</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <main id="main-content" class="page">
      <h1>Contact Form</h1>
      <p class="intro">Use this form to test accessibility checks.</p>

      <form id="contact-form" class="form" novalidate>
        <div class="field">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" autocomplete="name" required />
        </div>

        <!-- Error 1: input with placeholder as only label -->
        <div class="field">
          <label for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
          />
        </div>

        <!-- Error 2: select with no label -->
        <div class="field">
          <label for="topic">Topic</label>
          <select id="topic" name="topic">
            <option value="">Choose a topic</option>
            <option value="support">Support</option>
            <option value="sales">Sales</option>
          </select>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <!-- Error 3: button with no accessible name -->
        <button type="submit">Submit</button>

        <p id="form-status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
