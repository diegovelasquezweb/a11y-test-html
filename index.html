<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A11y Test Form</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .skip-link {
        position: absolute;
        left: -9999px;
        top: 0;
        z-index: 9999;
        padding: 8px 16px;
        background: #000;
        color: #fff;
        text-decoration: none;
      }
      .skip-link:focus {
        left: 0;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <main class="page" id="main-content">
      <h1>Contact Form</h1>
      <p class="intro">Use this form to test accessibility checks.</p>

      <!-- Error 1: image missing alt -->
      <img src="https://placehold.co/200x100" alt="Placeholder image 200 by 100 pixels" />

      <form id="contact-form" class="form" novalidate>
        <div class="field">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" autocomplete="name" required />
        </div>

        <!-- Error 2: input with placeholder as only label (DOM + source pattern) -->
        <div class="field">
          <label for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
          />
        </div>

        <!-- Error 3: select with no label -->
        <div class="field">
          <label id="topic-label" for="topic">Topic</label>
          <select id="topic" name="topic" aria-labelledby="topic-label" aria-label="Topic">
            <option value="">Choose a topic</option>
            <option value="support">Support</option>
            <option value="sales">Sales</option>
          </select>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <!-- Error 4: button with no accessible name -->
        <button type="submit" aria-label="Submit form"><span aria-hidden="true">→</span></button>

        <p id="form-status" class="status" role="status" aria-live="polite"></p>
      </form>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
