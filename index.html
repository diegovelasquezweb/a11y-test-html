<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A11y Test Site</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a href="#main" class="sr-only">Skip to main content</a>
    <nav aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
    <main id="main" class="page">
      <h1>Welcome</h1>
      <p>This is the home page of the a11y test site.</p>
      <img src="hero.png" alt="Team working on accessibility" />

      <!-- DOM: image-alt — img missing alt attribute -->
      <img src="decorative-banner.png" />

      <!-- DOM: color-contrast — text too light on white background -->
      <p style="color: #ccc;">This text has insufficient color contrast.</p>

      <!-- DOM: heading-order — skips h2, jumps directly to h3 -->
      <h3>Our Mission</h3>
      <p>We build accessible experiences for everyone.</p>

      <!-- DOM: link-name — empty anchor with no accessible text -->
      <a href="/more"></a>

      <!-- DOM: lang — invalid language code on child element -->
      <p lang="xx">Some content in an unrecognized language.</p>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
